abstract: |
  This thesis presents SmartGrader, a web-based platform for creating, managing,
  and automatically grading academic exams. The system supports both multiple-choice
  questions (MCQ) via optical mark recognition and short written answers via an
  integrated vision language model (Qwen2.5-VL-3B-Instruct). Built with a layered
  architecture using Flask, React, SQLAlchemy, and OpenCV, SmartGrader demonstrates
  how modern AI can assist educators in reducing manual grading workload while
  maintaining accuracy through a human-in-the-loop feedback mechanism. The system
  supports trilingual handwriting recognition (French, Arabic, English) and improves
  over time through a retrieval-augmented generation (RAG) feedback loop based on
  teacher corrections.
